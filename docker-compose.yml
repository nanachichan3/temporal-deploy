version: '3.8'

services:
  # Temporal Workflow Engine with PostgreSQL persistence
  temporal:
    image: temporalio/auto-setup:1.22.0
    container_name: factory-temporal
    ports:
      - "7233:7233"   # GRPC port
      - "8233:8233"   # HTTP port
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
    depends_on:
      - postgres
    networks:
      - temporal-network
    restart: unless-stopped

  # Temporal Web UI
  temporal-web:
    image: temporalio/web:1.22.0
    container_name: factory-temporal-web
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    networks:
      - temporal-network
    restart: unless-stopped

  # PostgreSQL for Temporal persistence
  postgres:
    image: postgres:15-alpine
    container_name: factory-temporal-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - temporal-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  temporal-network:
    driver: bridge
